name: Regenerate Anvil Interop Chain States

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number to update"
        required: true
  workflow_call:
    inputs:
      pr_number:
        description: "Pull Request number to update"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Get PR branch info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(context.payload.inputs?.pr_number || '${{ inputs.pr_number }}', 10),
            });
            core.setOutput("head_ref", pr.data.head.ref);
            core.setOutput("head_repo", pr.data.head.repo.full_name);

            if (pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed(`PR head repo is ${pr.data.head.repo.full_name}, expected ${context.repo.owner}/${context.repo.repo}`);
            }

      - name: Checkout PR branch
        run: |
          git fetch origin "${{ steps.pr.outputs.head_ref }}"
          git checkout "${{ steps.pr.outputs.head_ref }}"
          git submodule update --init --recursive

      - name: Install Foundry (no foundry-zksync — deterministic bytecode)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: Build da-contracts artifacts (no CBOR metadata for determinism)
        run: FOUNDRY_PROFILE=anvil-interop yarn da build:foundry

      - name: Build l1-contracts artifacts (no CBOR metadata for determinism)
        working-directory: l1-contracts
        run: FOUNDRY_PROFILE=anvil-interop forge build

      - name: Install anvil-interop dependencies
        working-directory: l1-contracts/test/anvil-interop
        run: yarn install

      - name: Generate chain state
        working-directory: l1-contracts/test/anvil-interop
        run: |
          echo "Generating chain state from scratch..."
          npx ts-node setup-and-dump-state.ts

      - name: Cleanup Anvil
        if: always()
        run: |
          pkill -9 anvil 2>/dev/null || true

      - name: Commit and push updated chain states
        run: |
          set -euo pipefail
          git config user.name "zksync[bot]"
          git config user.email "zksync[bot]@users.noreply.github.com"

          git add l1-contracts/test/anvil-interop/chain-states/
          git diff --cached --quiet && { echo "No chain state changes to commit"; exit 0; }
          git commit -m "chore: regenerate anvil-interop chain states

          Auto-generated by CI with foundry v1.5.1 and FOUNDRY_PROFILE=anvil-interop."
          git push origin HEAD
