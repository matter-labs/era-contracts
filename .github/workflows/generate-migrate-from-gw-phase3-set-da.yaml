name: "Migrate from Gateway: Phase 3 — Set DA Validator"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [stage, stage-interop-tests, sepolia, mainnet]
      protocol_ops_tag:
        description: "protocol-ops Docker image tag"
        required: true
        type: string
      l1_rpc_url:
        description: "L1 RPC URL"
        required: true
        type: string
      chain_name:
        description: "Chain name to migrate back from gateway"
        required: true
        type: string
      l1_da_validator:
        description: "L1 DA validator address to restore after migration"
        required: true
        type: string
      l2_da_commitment_scheme:
        description: "L2 DA commitment scheme"
        required: false
        type: choice
        options: [blobs-zk-sync-os, blobs-and-pubdata-keccak256]
        default: blobs-zk-sync-os

permissions:
  contents: read

jobs:
  set-da:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV_DIR: environments/${{ inputs.environment }}
      WORK_DIR: ${{ github.workspace }}/protocol-ops-workdir
      EXTRA_MOUNTS: ${{ github.workspace }}/environments/${{ inputs.environment }}:/contracts/env
    steps:
      - uses: actions/checkout@v4
      - name: Run phase 3 (set-da-validator-pair)
        run: |
          mkdir -p "$WORK_DIR"
          bash protocol-ops.sh --tag "${{ inputs.protocol_ops_tag }}" \
            chain gateway migrate-from phase-3-set-da-validator-pair \
            --l1-rpc-url "${{ inputs.l1_rpc_url }}" \
            --ecosystem  /contracts/env/ecosystem.yaml \
            --chain      "${{ inputs.chain_name }}" \
            --l1-da-validator "${{ inputs.l1_da_validator }}" \
            --l2-da-commitment-scheme "${{ inputs.l2_da_commitment_scheme }}" \
            --out /contracts/work/session/safe
      - uses: actions/upload-artifact@v4
        with:
          name: safe-bundles-migrate-from-gw-phase3-${{ inputs.chain_name }}-${{ inputs.environment }}
          path: ${{ env.WORK_DIR }}/safe/
          if-no-files-found: error
          retention-days: 30
