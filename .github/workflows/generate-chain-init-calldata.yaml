name: "Chain Init Calldata"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - stage-interop-tests
          - sepolia
          - mainnet
      protocol_ops_tag:
        description: "protocol-ops Docker image tag (e.g. latest, v0.31.0)"
        required: true
        type: string
      l1_rpc_url:
        description: "L1 RPC URL for the target environment"
        required: true
        type: string
      chain_name:
        description: "Chain name (new key under ecosystem.yaml `chains:`)"
        required: true
        type: string
      chain_id:
        description: "Chain ID (uint64)"
        required: true
        type: string
      deployer_address:
        description: "Deployer EOA that will broadcast the emitted bundle"
        required: true
        type: string
      chain_owner:
        description: "Chain owner EOA"
        required: true
        type: string
      commit_operator:
        description: "Chain commit-operator EOA"
        required: true
        type: string
      prove_operator:
        description: "Chain prove-operator EOA"
        required: true
        type: string
      execute_operator:
        description: "Chain execute-operator EOA (ZKsync OS only)"
        required: true
        type: string
      l1_da_validator_addr:
        description: "L1 DA validator address for the new chain"
        required: true
        type: string
      base_token_addr:
        description: "Base token address (0x0000...0001 for ETH)"
        required: false
        type: string
        default: "0x0000000000000000000000000000000000000001"
      base_token_price_ratio:
        description: "Base token price ratio (e.g. 4000/1 for ZK, 1/1 for ETH)"
        required: false
        type: string
        default: "1/1"
      pause_deposits:
        description: "Keep deposits paused after init"
        required: false
        type: boolean
        default: false
      skip_priority_txs:
        description: "Skip L2 deployments via priority transactions"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  chain-init:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV_DIR: environments/${{ inputs.environment }}
      WORK_DIR: ${{ github.workspace }}/protocol-ops-workdir
      EXTRA_MOUNTS: ${{ github.workspace }}/environments/${{ inputs.environment }}:/contracts/env

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Resolve bridgehub from ecosystem.yaml
        id: eco
        run: |
          bh=$(yq -er '.bridgehub' "$ENV_DIR/ecosystem.yaml")
          echo "bridgehub=$bh" >> "$GITHUB_OUTPUT"

      - name: Run chain init
        run: |
          mkdir -p "$WORK_DIR"
          bash protocol-ops.sh --tag "${{ inputs.protocol_ops_tag }}" \
            chain init \
            --l1-rpc-url          "${{ inputs.l1_rpc_url }}" \
            --bridgehub           "${{ steps.eco.outputs.bridgehub }}" \
            --chain-id            "${{ inputs.chain_id }}" \
            --deployer-address    "${{ inputs.deployer_address }}" \
            --owner               "${{ inputs.chain_owner }}" \
            --commit-operator     "${{ inputs.commit_operator }}" \
            --prove-operator      "${{ inputs.prove_operator }}" \
            --execute-operator    "${{ inputs.execute_operator }}" \
            --l1-da-validator     "${{ inputs.l1_da_validator_addr }}" \
            --base-token-addr     "${{ inputs.base_token_addr }}" \
            --base-token-price-ratio "${{ inputs.base_token_price_ratio }}" \
            --pause-deposits      "${{ inputs.pause_deposits }}" \
            --skip-priority-txs   "${{ inputs.skip_priority_txs }}" \
            --out /contracts/work/session/safe

      - name: Upload Safe bundles
        uses: actions/upload-artifact@v4
        with:
          name: safe-bundles-chain-init-${{ inputs.chain_name }}-${{ inputs.environment }}
          path: ${{ env.WORK_DIR }}/safe/
          if-no-files-found: error
          retention-days: 30
