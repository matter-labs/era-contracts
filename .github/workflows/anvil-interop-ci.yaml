name: Anvil Interop CI

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/anvil-interop-ci.yaml"
      - ".github/actions/install-zksync-foundry/**"
      - "l1-contracts/contracts/**"
      - "l1-contracts/deploy-scripts/**"
      - "l1-contracts/lib/**"
      - "l1-contracts/scripts/**"
      - "l1-contracts/test/**"
      - "l1-contracts/foundry.toml"
      - "l1-contracts/hardhat.config.ts"
      - "l1-contracts/package.json"
      - "l2-contracts/contracts/**"
      - "l2-contracts/lib/**"
      - "l2-contracts/src/**"
      - "l2-contracts/test/**"
      - "l2-contracts/foundry.toml"
      - "l2-contracts/hardhat.config.ts"
      - "l2-contracts/package.json"
      - "system-contracts/bootloader/**"
      - "system-contracts/contracts/**"
      - "system-contracts/lib/**"
      - "system-contracts/scripts/**"
      - "system-contracts/test/**"
      - "system-contracts/foundry.toml"
      - "system-contracts/hardhat.config.ts"
      - "system-contracts/package.json"
      - "da-contracts/contracts/**"
      - "da-contracts/lib/**"
      - "da-contracts/test/**"
      - "da-contracts/foundry.toml"
      - "da-contracts/hardhat.config.ts"
      - "da-contracts/package.json"
      - "package.json"
      - "yarn.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/anvil-interop-ci.yaml"
      - ".github/actions/install-zksync-foundry/**"
      - "l1-contracts/contracts/**"
      - "l1-contracts/deploy-scripts/**"
      - "l1-contracts/lib/**"
      - "l1-contracts/scripts/**"
      - "l1-contracts/test/**"
      - "l1-contracts/foundry.toml"
      - "l1-contracts/hardhat.config.ts"
      - "l1-contracts/package.json"
      - "l2-contracts/contracts/**"
      - "l2-contracts/lib/**"
      - "l2-contracts/src/**"
      - "l2-contracts/test/**"
      - "l2-contracts/foundry.toml"
      - "l2-contracts/hardhat.config.ts"
      - "l2-contracts/package.json"
      - "system-contracts/bootloader/**"
      - "system-contracts/contracts/**"
      - "system-contracts/lib/**"
      - "system-contracts/scripts/**"
      - "system-contracts/test/**"
      - "system-contracts/foundry.toml"
      - "system-contracts/hardhat.config.ts"
      - "system-contracts/package.json"
      - "da-contracts/contracts/**"
      - "da-contracts/lib/**"
      - "da-contracts/test/**"
      - "da-contracts/foundry.toml"
      - "da-contracts/hardhat.config.ts"
      - "da-contracts/package.json"
      - "package.json"
      - "yarn.lock"

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Foundry (includes Anvil)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install foundry-zksync
        uses: ./.github/actions/install-zksync-foundry

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: Build da-contracts artifacts
        run: yarn da build:foundry

      - name: Build l1-contracts artifacts (solc only, no zksolc, fast compile)
        working-directory: l1-contracts
        run: forge build --optimizer-runs 200

      - name: Install anvil-interop dependencies
        working-directory: l1-contracts/test/anvil-interop
        run: yarn install

      - name: TypeScript type check
        working-directory: l1-contracts/test/anvil-interop
        run: npx tsc --noEmit

      - name: Start Anvil Interop Environment
        working-directory: l1-contracts/test/anvil-interop
        run: |
          echo "Starting Anvil interop environment in background..."
          yarn start > deployment.log 2>&1 &
          YARN_PID=$!
          echo "Deployment started with PID: $YARN_PID"

          # Wait for deployment to complete (signaled by deployment-info.json)
          echo "Waiting for deployment to complete..."
          TIMEOUT=600  # 10 minutes
          ELAPSED=0
          INTERVAL=5

          while [ $ELAPSED -lt $TIMEOUT ]; do
            if [ -f "outputs/deployment-info.json" ]; then
              echo "✅ Deployment completed! (deployment-info.json found)"
              break
            fi

            if ! kill -0 $YARN_PID 2>/dev/null; then
              echo "❌ Deployment process died unexpectedly"
              echo "Deployment log (last 100 lines):"
              tail -100 deployment.log
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            echo "  Waiting... (${ELAPSED}s / ${TIMEOUT}s)"
          done

          if [ ! -f "outputs/deployment-info.json" ]; then
            echo "❌ Deployment timed out after ${TIMEOUT} seconds"
            echo "Deployment log (last 100 lines):"
            tail -100 deployment.log
            kill $YARN_PID 2>/dev/null || true
            pkill -9 anvil 2>/dev/null || true
            exit 1
          fi

          echo "Deployment info:"
          cat outputs/deployment-info.json

      - name: Run Integration Tests
        working-directory: l1-contracts
        run: |
          echo "Running Foundry integration tests..."
          forge script deploy-scripts/integration-tests/InteropTest.s.sol:InteropTest \
            --rpc-url http://127.0.0.1:9545 \
            --ffi \
            -vvv

      - name: Deploy test tokens for Hardhat interop test
        working-directory: l1-contracts/test/anvil-interop
        run: |
          echo "Deploying test tokens to L2 chains..."
          yarn deploy:test-token

      - name: Run Hardhat interop token transfer test
        working-directory: l1-contracts
        env:
          ANVIL_INTEROP_SKIP_SETUP: "1"
          ANVIL_INTEROP_SKIP_CLEANUP: "1"
        run: |
          echo "Running Hardhat interop token transfer test..."
          yarn hardhat test test/anvil-interop/test/hardhat/token-transfer.spec.ts --network hardhat --no-compile

      - name: Cleanup
        if: always()
        working-directory: l1-contracts/test/anvil-interop
        run: |
          echo "Cleaning up Anvil processes..."
          pkill -9 -f "yarn start" 2>/dev/null || true
          pkill -9 -f "ts-node index.ts" 2>/dev/null || true
          pkill -9 anvil 2>/dev/null || true
          echo "✅ Cleanup complete"

          if [ -f "deployment.log" ]; then
            echo "Final deployment log (last 200 lines):"
            tail -200 deployment.log
          fi
