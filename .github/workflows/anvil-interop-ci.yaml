name: Anvil Interop CI

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/anvil-interop-ci.yaml"
      - ".github/actions/install-zksync-foundry/**"
      - "l1-contracts/contracts/**"
      - "l1-contracts/deploy-scripts/**"
      - "l1-contracts/lib/**"
      - "l1-contracts/scripts/**"
      - "l1-contracts/test/**"
      - "l1-contracts/foundry.toml"
      - "l1-contracts/hardhat.config.ts"
      - "l1-contracts/package.json"
      - "l2-contracts/contracts/**"
      - "l2-contracts/lib/**"
      - "l2-contracts/src/**"
      - "l2-contracts/test/**"
      - "l2-contracts/foundry.toml"
      - "l2-contracts/hardhat.config.ts"
      - "l2-contracts/package.json"
      - "system-contracts/bootloader/**"
      - "system-contracts/contracts/**"
      - "system-contracts/lib/**"
      - "system-contracts/scripts/**"
      - "system-contracts/test/**"
      - "system-contracts/foundry.toml"
      - "system-contracts/hardhat.config.ts"
      - "system-contracts/package.json"
      - "da-contracts/contracts/**"
      - "da-contracts/lib/**"
      - "da-contracts/test/**"
      - "da-contracts/foundry.toml"
      - "da-contracts/hardhat.config.ts"
      - "da-contracts/package.json"
      - "package.json"
      - "yarn.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/anvil-interop-ci.yaml"
      - ".github/actions/install-zksync-foundry/**"
      - "l1-contracts/contracts/**"
      - "l1-contracts/deploy-scripts/**"
      - "l1-contracts/lib/**"
      - "l1-contracts/scripts/**"
      - "l1-contracts/test/**"
      - "l1-contracts/foundry.toml"
      - "l1-contracts/hardhat.config.ts"
      - "l1-contracts/package.json"
      - "l2-contracts/contracts/**"
      - "l2-contracts/lib/**"
      - "l2-contracts/src/**"
      - "l2-contracts/test/**"
      - "l2-contracts/foundry.toml"
      - "l2-contracts/hardhat.config.ts"
      - "l2-contracts/package.json"
      - "system-contracts/bootloader/**"
      - "system-contracts/contracts/**"
      - "system-contracts/lib/**"
      - "system-contracts/scripts/**"
      - "system-contracts/test/**"
      - "system-contracts/foundry.toml"
      - "system-contracts/hardhat.config.ts"
      - "system-contracts/package.json"
      - "da-contracts/contracts/**"
      - "da-contracts/lib/**"
      - "da-contracts/test/**"
      - "da-contracts/foundry.toml"
      - "da-contracts/hardhat.config.ts"
      - "da-contracts/package.json"
      - "package.json"
      - "yarn.lock"

jobs:
  # Fast job: uses pre-generated chain states from the repo, no contract compilation needed.
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Foundry (for Anvil only, no compilation needed)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: Install anvil-interop dependencies
        working-directory: l1-contracts/test/anvil-interop
        run: yarn install

      - name: TypeScript type check
        working-directory: l1-contracts/test/anvil-interop
        run: npx tsc --noEmit

      - name: Run interop tests (preloaded state)
        working-directory: l1-contracts/test/anvil-interop
        run: |
          echo "Running interop tests with preloaded chain states..."
          npx ts-node run-hardhat-interop-test.ts

      - name: Cleanup
        if: always()
        run: |
          pkill -9 anvil 2>/dev/null || true

  # Parallel job: rebuilds chain state from scratch and verifies determinism.
  # This ensures the committed chain-states stay reproducible.
  state-generation-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Foundry (includes Anvil)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Install foundry-zksync
        uses: ./.github/actions/install-zksync-foundry

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: Build da-contracts artifacts
        run: yarn da build:foundry

      - name: Build l1-contracts artifacts (solc only, no zksolc)
        working-directory: l1-contracts
        run: forge build

      - name: Install anvil-interop dependencies
        working-directory: l1-contracts/test/anvil-interop
        run: yarn install

      - name: Save committed chain states
        working-directory: l1-contracts/test/anvil-interop
        run: cp -r chain-states chain-states-committed

      - name: Generate chain state
        working-directory: l1-contracts/test/anvil-interop
        run: |
          echo "Generating chain state from scratch..."
          npx ts-node setup-and-dump-state.ts

      - name: Verify committed state matches generated state
        working-directory: l1-contracts/test/anvil-interop
        run: |
          echo "Comparing generated state against committed chain-states..."
          if python3 compare-chain-states.py chain-states-committed/. chain-states/.; then
            echo "✅ Chain states match"
          else
            echo ""
            echo "Committed chain-states differ from freshly generated state."
            echo "Run 'npx ts-node setup-and-dump-state.ts' locally and commit the updated chain-states."
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          pkill -9 anvil 2>/dev/null || true
