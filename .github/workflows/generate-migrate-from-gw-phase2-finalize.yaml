name: "Migrate from Gateway: Phase 2 — Finalize"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [stage, stage-interop-tests, sepolia, mainnet]
      protocol_ops_tag:
        description: "protocol-ops Docker image tag"
        required: true
        type: string
      l1_rpc_url:
        description: "L1 RPC URL"
        required: true
        type: string
      gateway_rpc_url:
        description: "Gateway L2 RPC URL"
        required: true
        type: string
      chain_name:
        description: "Chain name to migrate back from gateway"
        required: true
        type: string
      deployer_address:
        description: "Deployer EOA that will finalize the migration on L1"
        required: true
        type: string
      migration_l2_tx_hash:
        description: "L2 priority tx hash from phase 1 submit"
        required: true
        type: string

permissions:
  contents: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV_DIR: environments/${{ inputs.environment }}
      WORK_DIR: ${{ github.workspace }}/protocol-ops-workdir
      EXTRA_MOUNTS: ${{ github.workspace }}/environments/${{ inputs.environment }}:/contracts/env
    steps:
      - uses: actions/checkout@v4
      - name: Run phase 2 (finalize)
        run: |
          mkdir -p "$WORK_DIR"
          bash protocol-ops.sh --tag "${{ inputs.protocol_ops_tag }}" \
            chain gateway migrate-from phase-2-finalize \
            --l1-rpc-url           "${{ inputs.l1_rpc_url }}" \
            --ecosystem            /contracts/env/ecosystem.yaml \
            --chain                "${{ inputs.chain_name }}" \
            --deployer-address     "${{ inputs.deployer_address }}" \
            --gateway-rpc-url      "${{ inputs.gateway_rpc_url }}" \
            --migration-l2-tx-hash "${{ inputs.migration_l2_tx_hash }}" \
            --out /contracts/work/session/safe
      - uses: actions/upload-artifact@v4
        with:
          name: safe-bundles-migrate-from-gw-phase2-${{ inputs.chain_name }}-${{ inputs.environment }}
          path: ${{ env.WORK_DIR }}/safe/
          if-no-files-found: error
          retention-days: 30
