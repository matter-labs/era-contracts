name: "Migrate to Gateway: Phase 1 — Submit"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [stage, stage-interop-tests, sepolia, mainnet]
      protocol_ops_tag:
        description: "protocol-ops Docker image tag"
        required: true
        type: string
      l1_rpc_url:
        description: "L1 RPC URL"
        required: true
        type: string
      chain_name:
        description: "Chain name to migrate"
        required: true
        type: string
      gateway_chain_id:
        description: "Gateway chain ID (settlement layer to migrate to)"
        required: true
        type: string
      refund_recipient:
        description: "Refund recipient EOA for the L1->L2 priority tx"
        required: true
        type: string
      l1_gas_price:
        description: "L1 gas price in wei"
        required: false
        type: string
        default: "1000000000"
      vote_preparation_toml:
        description: "Vote-prep TOML path inside protocol-ops container"
        required: true
        type: string
        default: "/script-out/gateway_vote_prep_out.toml"

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV_DIR: environments/${{ inputs.environment }}
      WORK_DIR: ${{ github.workspace }}/protocol-ops-workdir
      EXTRA_MOUNTS: ${{ github.workspace }}/environments/${{ inputs.environment }}:/contracts/env
    steps:
      - uses: actions/checkout@v4
      - name: Run phase 1 (submit)
        run: |
          mkdir -p "$WORK_DIR"
          bash protocol-ops.sh --tag "${{ inputs.protocol_ops_tag }}" \
            chain gateway migrate-to phase-1-submit \
            --l1-rpc-url      "${{ inputs.l1_rpc_url }}" \
            --ecosystem       /contracts/env/ecosystem.yaml \
            --chain           "${{ inputs.chain_name }}" \
            --gateway-chain-id "${{ inputs.gateway_chain_id }}" \
            --l1-gas-price    "${{ inputs.l1_gas_price }}" \
            --vote-preparation-toml "${{ inputs.vote_preparation_toml }}" \
            --refund-recipient "${{ inputs.refund_recipient }}" \
            --out /contracts/work/session/safe
      - uses: actions/upload-artifact@v4
        with:
          name: safe-bundles-migrate-to-gw-phase1-${{ inputs.chain_name }}-${{ inputs.environment }}
          path: ${{ env.WORK_DIR }}/safe/
          if-no-files-found: error
          retention-days: 30
