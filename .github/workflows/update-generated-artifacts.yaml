name: Update All Generated Artifacts

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number to update"
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  update-hashes:
    name: Update contract hashes
    uses: ./.github/workflows/update-hashes-on-demand.yaml
    with:
      pr_number: ${{ github.event.inputs.pr_number }}
    secrets: inherit

  regenerate-chain-states:
    name: Regenerate chain states
    needs: [update-hashes]
    uses: ./.github/workflows/regenerate-chain-states.yaml
    with:
      pr_number: ${{ github.event.inputs.pr_number }}
    secrets: inherit
